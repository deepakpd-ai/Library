<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f7f4ef;
    --aged: #e8e0d0;
    --accent: #c0392b;
    --gold: #b5860d;
    --muted: #7a7068;
    --card-bg: #ffffff;
    --shadow: 0 2px 12px rgba(26,26,46,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    padding: 48px 40px 36px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '📚';
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 96px;
    opacity: 0.08;
  }
  .header-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  header p {
    color: #aaa;
    font-size: 14px;
    font-weight: 300;
    max-width: 500px;
  }

  /* TOOLBAR */
  .toolbar {
    background: var(--aged);
    border-bottom: 1px solid #d4c9b8;
    padding: 16px 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border: 1px solid #c4b99e;
    border-radius: 4px;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--muted);
  }

  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; font-weight: 500; color: var(--muted); }
  .filter-btn {
    padding: 6px 14px;
    border: 1px solid #c4b99e;
    border-radius: 20px;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .book-count {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .book-count span { font-weight: 600; color: var(--ink); }

  /* GRID */
  .grid-wrap { padding: 32px 40px 60px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border-radius: 4px;
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border-left: 4px solid transparent;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(26,26,46,0.14);
    border-left-color: var(--accent);
  }

  .card-spine {
    height: 7px;
  }

  .card-body { padding: 18px 18px 14px; flex: 1; display: flex; flex-direction: column; }
  .card-category {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .card-author {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 12px;
  }
  .card-desc {
    font-size: 12px;
    color: #5a5048;
    line-height: 1.6;
    flex: 1;
  }

  .card-footer {
    padding: 10px 18px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .status-available { background: #e8f5e9; color: #2e7d32; }
  .status-reading   { background: #fff8e1; color: #f57f17; }
  .status-lent      { background: #fce4ec; color: #c62828; }

  /* EMPTY */
  .empty { display: none; text-align: center; padding: 80px 20px; grid-column: 1/-1; }
  .empty p { color: var(--muted); font-size: 15px; }

  /* MODAL OVERLAY */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,26,46,0.55);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 6px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .modal-header-left {}
  .modal-category-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 6px;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700; line-height: 1.25; color: var(--ink);
  }
  .modal-close {
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--muted); flex-shrink: 0; padding: 2px;
  }
  .modal-body { padding: 16px 24px 24px; }
  .modal-author { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .modal-desc { font-size: 13px; color: #3a3028; line-height: 1.7; margin-bottom: 18px; }
  .modal-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .status-select {
    padding: 6px 12px; border: 1px solid #d4c9b8; border-radius: 4px;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    background: #fff; color: var(--ink); cursor: pointer; outline: none;
  }
  .status-select:focus { border-color: var(--accent); }

  @media (max-width: 600px) {
    header { padding: 32px 20px 24px; }
    .toolbar { padding: 12px 20px; }
    .grid-wrap { padding: 20px 20px 40px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Personal Collection</div>
  <h1>My Library</h1>
  <p>A curated collection of books on business, leadership, innovation, and ideas.</p>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search title or author…" oninput="filterBooks()">
  </div>
  <div class="filter-group">
    <span class="filter-label">Category:</span>
    <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Leadership', this)">Leadership</button>
    <button class="filter-btn" onclick="setFilter('Business Strategy', this)">Strategy</button>
    <button class="filter-btn" onclick="setFilter('Innovation', this)">Innovation</button>
    <button class="filter-btn" onclick="setFilter('Personal Finance', this)">Finance</button>
    <button class="filter-btn" onclick="setFilter('Science & Tech', this)">Science & Tech</button>
    <button class="filter-btn" onclick="setFilter('Other', this)">Other</button>
  </div>
  <div class="book-count">Showing <span id="visibleCount">25</span> of <span id="totalCount">25</span> books</div>
</div>

<div class="grid-wrap">
  <div class="grid" id="bookGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-category-label" id="mCat"></div>
        <div class="modal-title" id="mTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-author" id="mAuthor"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="modal-meta">
        <select class="status-select" id="mStatus" onchange="updateStatus()"></select>
      </div>
    </div>
  </div>
</div>

<script>
const CATEGORY_COLORS = {
  'Leadership':       '#2980b9',
  'Business Strategy':'#16a085',
  'Innovation':       '#8e44ad',
  'Personal Finance': '#d35400',
  'Science & Tech':   '#27ae60',
  'Biography':        '#c0392b',
  'Other':            '#7f8c8d',
};

const BOOKS = [
  {
    title: "The Three Laws of Performance",
    author: "Steve Zaffron & Dave Logan",
    category: "Leadership",
    desc: "Reveals how language shapes performance in organizations and how leaders can rewrite the future by changing the stories people tell about their situation.",
    status: "Available"
  },
  {
    title: "Liberty and Tyranny",
    author: "Mark R. Levin",
    category: "Other",
    desc: "A conservative manifesto arguing for constitutional limits on government and individual liberty against the encroachment of statist ideology.",
    status: "Available"
  },
  {
    title: "The Leadership Challenge",
    author: "Kouzes & Posner",
    category: "Leadership",
    desc: "A research-backed framework of the Five Practices of Exemplary Leadership, drawn from thousands of interviews with leaders around the world. (4th Edition)",
    status: "Available"
  },
  {
    title: "Jugaad Innovation",
    author: "Navi Radjou, Jaideep Prabhu & Simone Ahuja",
    category: "Innovation",
    desc: "Explores the Indian concept of frugal, flexible innovation and how Western companies can embrace this disruptive approach to do more with less.",
    status: "Available"
  },
  {
    title: "Why Can't We Get Anything Done Around Here?",
    author: "Lefton & Loeb",
    category: "Business Strategy",
    desc: "Diagnoses organizational dysfunction and provides tools to break through bureaucratic barriers to execution and results.",
    status: "Available"
  },
  {
    title: "The Ultimate Gift",
    author: "Jim Stovall",
    category: "Other",
    desc: "A parable about a spoiled young man who must learn twelve life lessons in order to receive his inheritance — a transformative story about the true gifts of life.",
    status: "Available"
  },
  {
    title: "Retire Young Retire Rich",
    author: "Robert T. Kiyosaki",
    category: "Personal Finance",
    desc: "Kiyosaki's guide to accelerating the path to financial independence through leveraging assets, mindset, and the lessons of Rich Dad.",
    status: "Available"
  },
  {
    title: "...A Mother's Heart?",
    author: "Arun Shourie",
    category: "Other",
    desc: "A deeply personal account by journalist and politician Arun Shourie about raising a child with cerebral palsy, touching on faith, family, and the human spirit.",
    status: "Available"
  },
  {
    title: "The Toyota Way",
    author: "Jeffrey Liker",
    category: "Business Strategy",
    desc: "Documents the 14 management principles behind Toyota's renowned production system and its philosophy of continuous improvement (kaizen).",
    status: "Available"
  },
  {
    title: "If It Ain't Broke… Break It!",
    author: "Robert J. Kriegel & Louis Patler",
    category: "Innovation",
    desc: "Challenges the 'if it ain't broke, don't fix it' mindset and urges leaders to disrupt their own success before competitors do it for them.",
    status: "Available"
  },
  {
    title: "Elon Musk",
    author: "Ashlee Vance",
    category: "Biography",
    desc: "The definitive biography of the entrepreneur behind Tesla, SpaceX, and PayPal — charting his relentless drive to transform multiple industries.",
    status: "Available"
  },
  {
    title: "The Dance of Molecules",
    author: "Ted Sargent",
    category: "Science & Tech",
    desc: "A vivid exploration of nanotechnology and how the manipulation of matter at the molecular scale is set to revolutionize medicine, energy, and everyday life.",
    status: "Available"
  },
  {
    title: "Corporate Combat",
    author: "Nick Skellon",
    category: "Business Strategy",
    desc: "Applies Sun Tzu's Art of War and military strategy principles to modern corporate competition and business warfare.",
    status: "Available"
  },
  {
    title: "The Balanced Scorecard",
    author: "Robert S. Kaplan & David P. Norton",
    category: "Business Strategy",
    desc: "The seminal work on translating strategy into action using a four-perspective framework: financial, customer, internal processes, and learning & growth.",
    status: "Available"
  },
  {
    title: "Build, Borrow, or Buy",
    author: "Laurence Capron & Will Mitchell",
    category: "Business Strategy",
    desc: "A strategic framework for deciding whether to develop capabilities internally, form alliances, or acquire them through M&A — with a practical decision roadmap.",
    status: "Available"
  },
  {
    title: "Drive",
    author: "Daniel H. Pink",
    category: "Leadership",
    desc: "Overturns conventional wisdom about motivation to reveal that autonomy, mastery, and purpose — not rewards and punishments — drive peak performance.",
    status: "Available"
  },
  {
    title: "The Haystack Syndrome",
    author: "Eliyahu M. Goldratt",
    category: "Business Strategy",
    desc: "Goldratt argues that most companies drown in data but starve for information, and shows how the Theory of Constraints cuts through the noise.",
    status: "Available"
  },
  {
    title: "Know-How",
    author: "Ram Charan",
    category: "Leadership",
    desc: "Identifies eight essential skills — from positioning your business to managing the social system — that distinguish truly effective leaders.",
    status: "Available"
  },
  {
    title: "Confidence",
    author: "Rosabeth Moss Kanter",
    category: "Leadership",
    desc: "Examines why winning streaks and losing streaks persist in sports and business, and how leaders can build the culture of confidence that reverses decline.",
    status: "Available"
  },
  {
    title: "The 8th Habit",
    author: "Stephen R. Covey",
    category: "Leadership",
    desc: "Covey's sequel to The 7 Habits, arguing that finding your voice and inspiring others to find theirs is the defining challenge of the new knowledge-worker age.",
    status: "Available"
  },
  {
    title: "Synchronicity: The Inner Path of Leadership",
    author: "Joseph Jaworski",
    category: "Leadership",
    desc: "A profound memoir-meets-philosophy exploring how deep listening, presence, and commitment unlock leadership that transforms organizations and societies.",
    status: "Available"
  },
  {
    title: "Innovate Like Edison",
    author: "Michael J. Gelb & Sarah Miller Caldicott",
    category: "Innovation",
    desc: "Distills Edison's five competencies for innovation — solution-centered mindset, kaleidoscopic thinking, full-spectrum engagement, master-mind collaboration, and super-value creation.",
    status: "Available"
  },
  {
    title: "Love 'Em or Lose 'Em",
    author: "Beverly Kaye & Sharon Jordan-Evans",
    category: "Leadership",
    desc: "A practical guide for managers on the 26 strategies — A to Z — for retaining talented employees in a competitive talent market. (3rd Edition)",
    status: "Available"
  },
  {
    title: "Making Things Move",
    author: "Dustyn Roberts",
    category: "Science & Tech",
    desc: "A hands-on guide to DIY mechanisms, motors, and motion systems for inventors, hobbyists, and artists, bridging engineering concepts with creative making.",
    status: "Available"
  },
  {
    title: "The Universe in a Nutshell",
    author: "Stephen Hawking",
    category: "Science & Tech",
    desc: "Hawking's illustrated journey through the frontiers of physics — from quantum mechanics and p-branes to superstring theory and the nature of time.",
    status: "Available"
  }
];

// Load statuses from storage or defaults
function loadStatuses() {
  const stored = localStorage.getItem('bookStatuses');
  if (stored) {
    const map = JSON.parse(stored);
    BOOKS.forEach((b, i) => { if (map[i]) b.status = map[i]; });
  }
}

function saveStatuses() {
  const map = {};
  BOOKS.forEach((b, i) => { map[i] = b.status; });
  localStorage.setItem('bookStatuses', JSON.stringify(map));
}

let activeFilter = 'All';
let activeIndex = null;

function spineColor(category) {
  return CATEGORY_COLORS[category] || '#7f8c8d';
}

function statusClass(status) {
  if (status === 'Reading') return 'status-reading';
  if (status === 'Lent Out') return 'status-lent';
  return 'status-available';
}

function renderGrid() {
  const grid = document.getElementById('bookGrid');
  const query = document.getElementById('searchInput').value.toLowerCase();
  let visible = 0;

  grid.innerHTML = '';
  BOOKS.forEach((book, i) => {
    const matchSearch = book.title.toLowerCase().includes(query) || book.author.toLowerCase().includes(query);
    const matchFilter = activeFilter === 'All' || book.category === activeFilter;
    if (!matchSearch || !matchFilter) return;

    visible++;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-spine" style="background:${spineColor(book.category)}"></div>
      <div class="card-body">
        <div class="card-category">${book.category}</div>
        <div class="card-title">${book.title}</div>
        <div class="card-author">${book.author}</div>
        <div class="card-desc">${book.desc.length > 100 ? book.desc.slice(0, 100) + '…' : book.desc}</div>
      </div>
      <div class="card-footer">
        <span class="status-badge ${statusClass(book.status)}">${book.status}</span>
      </div>
    `;
    card.addEventListener('click', () => openModal(i));
    grid.appendChild(card);
  });

  if (visible === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.style.display = 'block';
    empty.innerHTML = '<p>No books match your search.</p>';
    grid.appendChild(empty);
  }

  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('totalCount').textContent = BOOKS.length;
}

function filterBooks() { renderGrid(); }

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function openModal(i) {
  activeIndex = i;
  const b = BOOKS[i];
  document.getElementById('mCat').textContent = b.category;
  document.getElementById('mTitle').textContent = b.title;
  document.getElementById('mAuthor').textContent = 'by ' + b.author;
  document.getElementById('mDesc').textContent = b.desc;

  const sel = document.getElementById('mStatus');
  sel.innerHTML = ['Available','Reading','Lent Out'].map(s =>
    `<option value="${s}" ${b.status===s?'selected':''}>${s}</option>`
  ).join('');

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  activeIndex = null;
}

function updateStatus() {
  if (activeIndex === null) return;
  BOOKS[activeIndex].status = document.getElementById('mStatus').value;
  saveStatuses();
  renderGrid();
}

loadStatuses();
renderGrid();
</script>
</body>
</html>
